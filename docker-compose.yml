version: '3.8'

services:
  mongodb:
    image: mongo:8.0
    container_name: conversation-engine-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: conversation_engine_test
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --username admin --password admin123 --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conversation-network

volumes:
  mongo_data:
  mongo_config:

networks:
  conversation-network:
    driver: bridge
