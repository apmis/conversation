version: '3.8'

services:
  mongodb:
    image: mongo:8.0
    container_name: conversation-engine-mongodb
    restart: unless-stopped
    # 1. Start as a replica set named "rs0"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: conversation_engine_test
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --username admin --password admin123 --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conversation-network

  # 2. Add this helper to initialize the replica set automatically
  mongo-init:
    image: mongo:8.0
    container_name: mongo-init-replica
    networks:
      - conversation-network
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: >
      mongosh --host mongodb --username admin --password admin123 --authenticationDatabase admin --eval 
      'rs.initiate({_id: "rs0", members: [{_id: 0, host: "mongodb:27017"}]})'

volumes:
  mongo_data:
  mongo_config:

networks:
  conversation-network:
    driver: bridge
